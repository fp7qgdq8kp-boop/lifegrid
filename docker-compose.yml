services:
  db:
    image: postgres:16-alpine
    container_name: lifegrid-postgres
    environment:
      POSTGRES_DB: lifegrid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lifegrid-postgres:/var/lib/postgresql/data

volumes:
  lifegrid-postgres:
