services:
  db:
    image: postgres:16-alpine
    container_name: lifegrid-db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - lifegrid-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifegrid-app
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${LIFEGRID_PUBLIC_PORT:-3010}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  init:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["manual"]
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "npx prisma db push --skip-generate &&
      if [ \"$$SEED_DATABASE\" = \"true\" ]; then npm run db:seed; else echo 'Skipping seed'; fi"

volumes:
  lifegrid-postgres-data:
